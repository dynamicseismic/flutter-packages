name: dynamic_haptics
description: WebHaptics-style haptic feedback presets and custom vibration patterns for Flutter.
version: 0.0.1
homepage: https://github.com/flutterhaptics/flutter_haptics
repository: https://github.com/flutterhaptics/flutter_haptics
topics:
  - haptics
  - vibration
  - feedback
  - flutter

resolution: workspace

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.flutterhaptics.flutter_haptics
        pluginClass: FlutterHapticsPlugin
      ios:
        pluginClass: FlutterHapticsPlugin
