name: dynamic_flutter_packages_workspace
description: Monorepo of Flutter packages (haptics, animated/morphing icons, text morph, confetti, native clipboard/drag-drop/context-menu) + showcase app.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.0

# Dart pub workspaces (required since Melos 7): the whole workspace resolves once,
# into a single root pubspec.lock. Each member declares `resolution: workspace`.
workspace:
  - packages/dynamic_confetti
  - packages/dynamic_confetti/example
  - packages/dynamic_haptics
  - packages/dynamic_haptics/example
  - packages/dynamic_icons
  - packages/dynamic_icons/example
  - packages/dynamic_morphing_icons
  - packages/dynamic_morphing_icons/example
  - packages/dynamic_torph
  - packages/dynamic_torph/example
  - packages/dynamic_touchable
  - packages/dynamic_touchable/example
  # super_native_extensions fork (super_ -> dynamic_). Native Rust+FFI plugin
  # dynamic_native_extensions + the pure-Dart packages built on it. Its vendored
  # cargokit/build_tool is intentionally NOT a member (pinned deps, own lockfile).
  - packages/dynamic_native_extensions
  - packages/dynamic_clipboard
  - packages/dynamic_context_menu
  - packages/dynamic_drag_and_drop
  - packages/dynamic_keyboard_layout
  - packages/dynamic_hot_key
  - apps/showcase

dev_dependencies:
  melos: ^7.8.2

# Melos 7: melos.yaml is gone — config lives here. The package list is the
# `workspace:` field above.
melos:
  scripts:
    analyze:
      description: dart analyze across the workspace
      run: dart analyze
      exec:
        concurrency: 1

    format:
      description: dart format (CI mode — fails on diff)
      run: dart format --set-exit-if-changed .
      exec:
        concurrency: 1

    test:
      description: flutter test across Flutter packages
      run: flutter test
      exec:
        concurrency: 1
      packageFilters:
        flutter: true
